<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .calculadora {
      background: #222;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      width: 320px;
    }

    .display {
      background: #000;
      color: #0f0;
      font-size: 2.5rem;
      text-align: right;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
      min-height: 80px;
      overflow: hidden;
      box-shadow: inset 0 5px 10px rgba(0,0,0,0.8);
    }

    .botoes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      font-size: 1.5rem;
      padding: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .numero, .ponto {
      background: #333;
      color: white;
    }

    .operacao {
      background: #ff9500;
      color: white;
    }

    .igual {
      background: #00d100;
      color: white;
      font-weight: bold;
    }

    .limpar {
      background: #f00;
      color: white;
    }

    button:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="calculadora">
    <div class="display" id="display">0</div>
    
    <div class="botoes">
      <button class="limpar" onclick="limpar()">C</button>
      <button class="limpar" onclick="apagarUltimo()">←</button>
      <button class="operacao" onclick="adicionarOperacao('%')">%</button>
      <button class="operacao" onclick="adicionarOperacao('/')">÷</button>

      <button class="numero" onclick="adicionarNumero('7')">7</button>
      <button class="numero" onclick="adicionarNumero('8')">8</button>
      <button class="numero" onclick="adicionarNumero('9')">9</button>
      <button class="operacao" onclick="adicionarOperacao('*')">×</button>

      <button class="numero" onclick="adicionarNumero('4')">4</button>
      <button class="numero" onclick="adicionarNumero('5')">5</button>
      <button class="numero" onclick="adicionarNumero('6')">6</button>
      <button class="operacao" onclick="adicionarOperacao('-')">−</button>

      <button class="numero" onclick="adicionarNumero('1')">1</button>
      <button class="numero" onclick="adicionarNumero('2')">2</button>
      <button class="numero" onclick="adicionarNumero('3')">3</button>
      <button class="operacao" onclick="adicionarOperacao('+')">+</button>

      <button class="numero" onclick="adicionarNumero('0')" style="grid-column: span 2;">0</button>
      <button class="ponto" onclick="adicionarPonto('.')">.</button>
      <button class="igual" onclick="calcular()">=</button>
    </div>
  </div>

  <script>
    let display = document.getElementById('display');
    let valorAtual = '0';
    let deveLimpar = false;

    function atualizarDisplay() {
      display.textContent = valorAtual;
    }

    function adicionarNumero(numero) {
      if (deveLimpar) {
        valorAtual = '0';
        deveLimpar = false;
      }
      if (valorAtual === '0' && numero !== '0') {
        valorAtual = numero;
      } else {
        valorAtual += numero;
      }
      atualizarDisplay();
    }

    function adicionarPonto() {
      if (deveLimpar) {
        valorAtual = '0';
        deveLimpar = false;
      }
      if (!valorAtual.includes('.')) {
        valorAtual += '.';
      }
      atualizarDisplay();
    }

    function adicionarOperacao(op) {
      if (deveLimpar) deveLimpar = false;
      valorAtual += op;
      atualizarDisplay();
    }

    function calcular() {
      try {
        // Substitui os símbolos para o JavaScript entender
        let expressao = valorAtual
          .replace(/×/g, '*')
          .replace(/÷/g, '/')
          .replace(/−/g, '-');

        let resultado = eval(expressao);

        // Formata o resultado
        if (Number.isInteger(resultado)) {
          valorAtual = resultado.toString();
        } else {
          valorAtual = parseFloat(resultado.toFixed(8)).toString();
        }
      } catch (e) {
        valorAtual = 'Erro';
      }
      deveLimpar = true;
      atualizarDisplay();
    }

    function limpar() {
      valorAtual = '0';
      deveLimpar = false;
      atualizarDisplay();
    }

    function apagarUltimo() {
      if (deveLimpar) {
        limpar();
        return;
      }
      if (valorAtual.length > 1) {
        valorAtual = valorAtual.slice(0, -1);
      } else {
        valorAtual = '0';
      }
      atualizarDisplay();
    }

    // Permite usar o teclado
    document.addEventListener('keydown', function(e) {
      if (e.key >= '0' && e.key <= '9') adicionarNumero(e.key);
      if (e.key === '.') adicionarPonto();
      if (e.key === '+') adicionarOperacao('+');
      if (e.key === '-') adicionarOperacao('-');
      if (e.key === '*') adicionarOperacao('*');
      if (e.key === '/') adicionarOperacao('/');
      if (e.key === 'Enter' || e.key === '=') calcular();
      if (e.key === 'Backspace') apagarUltimo();
      if (e.key === 'Escape') limpar();
    });

    // Inicializa
    atualizarDisplay();
  </script>

</body>
</html>
