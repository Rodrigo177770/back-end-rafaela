<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style>
        /* CSS: Estilização Moderna */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  /* Fundo com degradê vivo */
  background: linear-gradient(-45deg, #000000, #ff00e1, #23b7d5, #ff8c00);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  font-family: 'Segoe UI', sans-serif;
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

button {
  padding: 15px 40px;
  font-size: 1.2rem;
  font-weight: bold;
  color: white;
  background: rgba(255, 255, 255, 0.2); /* Fundo semi-transparente */
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 50px;
  backdrop-filter: blur(10px); /* Efeito de vidro fosco */
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

/* Efeito ao passar o mouse */
button:hover {
  background: rgba(255, 255, 255, 0.4);
  transform: translateY(-3px); /* Sobe um pouquinho */
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
}

/* Efeito ao clicar */
button:active {
  transform: translateY(0);
}

    </style>
</head>
